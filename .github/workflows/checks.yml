name: Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  local-links:
    name: Local Link Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check local links
        run: npm run check:links:local
