name: Fork PR Preview

on:
  pull_request_target:
    types:
      - labeled
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: fork-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy fork preview
    if: contains(github.event.pull_request.labels.*.name, 'deploy-preview')
    runs-on: ubuntu-latest
    environment: cloudflare-preview

    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload preview version
        id: preview
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          output_file="$(mktemp)"
          npx wrangler versions upload \
            --preview-alias "$PREVIEW_ALIAS" \
            --message "Preview for PR #${{ github.event.pull_request.number }} at ${{ github.event.pull_request.head.sha }}" \
            | tee "$output_file"
          preview_url="$(grep -Eo 'https://[^[:space:]]+' "$output_file" | tail -n 1)"
          if [ -z "$preview_url" ]; then
            echo "Could not find preview URL in Wrangler output" >&2
            exit 1
          fi
          echo "url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cloudflare-fork-preview -->';
            const url = '${{ steps.preview.outputs.url }}';
            const body = `${marker}
            Cloudflare preview for this PR:

            ${url}

            This preview updates when the PR changes while the \`deploy-preview\` label remains present.`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
